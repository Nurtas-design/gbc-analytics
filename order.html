<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Collection — Тапсырыс беру</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="order.css"/>
</head>
<body>

<header>
  <a href="./index.html" class="logo">
    <div class="logo-mark">✦</div>
    <span class="logo-name">Nova Collection</span>
  </a>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('kk')">ҚАЗ</button>
    <button class="lang-btn" onclick="setLang('ru')">РУС</button>
    <button class="lang-btn" onclick="setLang('en')">ENG</button>
  </div>
</header>

<button onclick="showUTMPanel()" style="
  position:fixed; bottom:24px; right:24px; z-index:998;
  padding:10px 18px;
  background:linear-gradient(135deg,#7c6af7,#f472b6);
  border:none; border-radius:12px; color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer;
  box-shadow:0 4px 20px rgba(124,106,247,0.4);
">🔗 UTM</button>

<main>
  <div class="page-intro">
    <div class="label" id="lbl-badge">Nova Collection</div>
    <h1 id="lbl-title">Тапсырыс беру</h1>
    <p id="lbl-sub">Деректеріңізді толтырыңыз, менеджер хабарласады</p>
  </div>

  <div class="form-card">
    <div class="form-section">
      <div class="section-title" id="lbl-section-contact">Байланыс деректері</div>
      <div class="field-row">
        <div class="field" id="f-fname">
          <label><span id="lbl-fname">Аты</span><span class="req">*</span></label>
          <input type="text" id="inp-fname" placeholder="Мысалы: Айгүл" autocomplete="given-name"/>
          <span class="err-msg" id="err-fname"></span>
        </div>
        <div class="field" id="f-lname">
          <label><span id="lbl-lname">Тегі</span><span class="req">*</span></label>
          <input type="text" id="inp-lname" placeholder="Мысалы: Сейткали" autocomplete="family-name"/>
          <span class="err-msg" id="err-lname"></span>
        </div>
      </div>
      <div class="field-row" style="margin-top:14px">
        <div class="field" id="f-phone">
          <label><span id="lbl-phone">Телефон</span><span class="req">*</span></label>
          <input type="tel" id="inp-phone" placeholder="+7 777 000 00 00" autocomplete="tel" oninput="formatPhone(this)" onkeydown="phoneKeydown(event, this)" maxlength="18"/>
          <span class="err-msg" id="err-phone"></span>
        </div>
        <div class="field">
          <label id="lbl-email">Email</label>
          <input type="email" id="inp-email" placeholder="name@example.com" autocomplete="email"/>
        </div>
      </div>
      <div class="field-row single" style="margin-top:14px">
        <div class="field" id="f-city">
          <label><span id="lbl-city">Қала</span><span class="req">*</span></label>
          <select id="inp-city">
            <option value="">— таңдаңыз —</option>
            <option>Алматы</option>
            <option>Астана</option>
            <option>Шымкент</option>
            <option>Қарағанды</option>
            <option>Атырау</option>
            <option>Ақтөбе</option>
            <option>Тараз</option>
            <option>Павлодар</option>
            <option>Өскемен</option>
            <option>Семей</option>
            <option>Орал</option>
          </select>
          <span class="err-msg" id="err-city"></span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title" id="lbl-section-items">Тауарлар</div>
      <div id="items-container"></div>
      <button class="add-item-btn" onclick="addItem()" id="btn-add-item">+ Тауар қосу</button>

      <div class="total-bar">
        <span class="total-label" id="lbl-total">Жалпы сомасы</span>
        <span class="total-value" id="total-display">0 ₸</span>
      </div>
    </div>

    <button class="submit-btn" onclick="submitOrder()" id="submit-btn">
      <span id="submit-text">Тапсырыс беру</span>
    </button>
  </div>
</main>

<div class="success-overlay" id="success-overlay">
  <div class="success-box">
    <div class="success-icon">✓</div>
    <div class="success-title" id="suc-title">Тапсырыс қабылданды!</div>
    <div class="success-amount" id="suc-amount"></div>
    <div class="success-sub" id="suc-sub">Менеджер жақын арада хабарласады</div>
    <a href="./order.html" class="back-btn" id="suc-btn">Жаңа тапсырыс</a>
  </div>
</div>

<script src="order.js"></script>
<style>
/* UTM батырмасы — мобильде төменгі орталыққа */
@media (max-width: 768px) {
  #utm-panel {
    bottom: 0 !important;
    right: 0 !important;
    left: 0 !important;
    width: 100% !important;
    border-radius: 20px 20px 0 0 !important;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 16px 32px !important;
  }
  button[onclick="showUTMPanel()"] {
    bottom: 16px !important;
    right: 16px !important;
    padding: 10px 16px !important;
    font-size: 12px !important;
    border-radius: 50px !important;
    box-shadow: 0 4px 20px rgba(124,106,247,0.5) !important;
  }
}
</style>
</body>
</html>
